<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EveryYou - Premium Downloader</title>
    <meta name="theme-color" content="#402B19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header class="app-header text-center mb-4">
        <h1><i class="fa-solid fa-cloud-arrow-down"></i> EveryYou</h1>
        <p>O seu downloader universal</p>
    </header>

    <div class="input-card card mb-4">
        <div class="card-body">
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-link"></i></span>
                <input type="url" id="urlInput" class="form-control" placeholder="Cole o link do vídeo ou música aqui..." autocomplete="off">
            </div>
            <button id="analyzeBtn" class="btn btn-primary w-100 mt-3 fw-bold">Analisar Link</button>
        </div>
    </div>

    <div id="loadingBox" class="text-center d-none my-4">
        <div class="spinner-border" role="status"></div>
        <p class="mt-2 text-muted">Analisando mídia...</p>
    </div>

    <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

    <div id="previewCard" class="card media-card d-none">
        <img id="mediaThumbnail" src="" class="card-img-top" alt="Thumbnail">
        <div class="platform-badge" id="mediaPlatform">YouTube</div>
        <div class="card-body">
            <h5 id="mediaTitle" class="card-title text-truncate">Título do Vídeo</h5>
            <p class="card-text text-muted mb-3"><i class="fa-regular fa-clock"></i> <span id="mediaDuration">00:00</span></p>
            
            <label class="form-label fw-bold">Qualidade</label>
            <select id="formatSelect" class="form-select mb-3"></select>
            
            <button id="downloadBtn" class="btn btn-primary w-100 fw-bold"><i class="fa-solid fa-download"></i> Baixar Agora</button>
        </div>
    </div>

    <div id="progressCard" class="card d-none mt-3">
        <div class="card-body">
            <h6 class="text-center mb-3" id="progressStatus">Preparando download...</h6>
            <div class="progress mb-2" style="height: 12px;">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;"></div>
            </div>
            <div class="d-flex justify-content-between text-muted" style="font-size: 0.85rem;">
                <span id="progressSpeed">0 MB/s</span>
                <span id="progressEta">00:00 restantes</span>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
